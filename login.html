<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - YTArchive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body style="background:var(--yta-bg)">

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-film me-1"></i>YTArchive</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card card">
    <div class="card-body">
      <div class="text-center mb-4">
        <div class="fs-2 mb-1">🎬</div>
        <h4 class="fw-bold mb-0">YTArchive 로그인</h4>
        <p class="text-muted small mt-1">아카이브를 계속하세요</p>
      </div>

      <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">이메일 주소</label>
          <input type="email" id="email" class="form-control" placeholder="user@example.com" required>
          <div class="invalid-feedback">올바른 이메일을 입력해주세요.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">비밀번호</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="비밀번호 입력" required>
            <button type="button" class="btn btn-outline-secondary" id="togglePw">
              <i class="bi bi-eye" id="pwIcon"></i>
            </button>
          </div>
          <div class="invalid-feedback">비밀번호를 입력해주세요.</div>
        </div>

        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" id="rememberMe">
          <label class="form-check-label text-muted small" for="rememberMe">30일간 자동 로그인</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="loginBtn">
          로그인
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted small mb-0">
        계정이 없으신가요? <a href="register.html" class="text-primary fw-semibold text-decoration-none">회원가입</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  // 이미 로그인이면 대시보드로
  Auth.redirectIfAuth();

  // 비밀번호 토글
  document.getElementById('togglePw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.getElementById('pwIcon');
    if (pw.type === 'password') {
      pw.type = 'text'; icon.className = 'bi bi-eye-slash';
    } else {
      pw.type = 'password'; icon.className = 'bi bi-eye';
    }
  });

  // 로그인 폼
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('rememberMe').checked;
    const alertBox = document.getElementById('alertBox');
    const btn      = document.getElementById('loginBtn');

    alertBox.classList.add('d-none');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>로그인 중...';

    try {
      await Auth.login(email, password, remember);
      window.location.href = 'dashboard.html';
    } catch (err) {
      alertBox.textContent = err.message;
      alertBox.classList.remove('d-none');
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  });
</script>
</body>
</html>
