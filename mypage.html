<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - YTArchive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html"><i class="bi bi-film me-1"></i>YTArchive</a>
    <div class="d-flex gap-2 ms-auto align-items-center">
      <a href="dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-grid me-1"></i>대시보드</a>
      <div id="memberNav" class="d-none dropdown">
        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle me-1"></i><span id="userNickname"></span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item text-danger" href="#" onclick="Auth.logout()"><i class="bi bi-box-arrow-right me-2"></i>로그아웃</a></li>
        </ul>
      </div>
      <div id="guestNav" class="d-none"></div>
    </div>
  </div>
</nav>

<div class="container py-4" style="max-width:900px">

  <!-- Profile Card -->
  <div class="bg-white rounded-4 border border-light p-4 mb-4">
    <div class="d-flex align-items-center gap-4 flex-wrap">
      <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold"
           style="width:80px;height:80px;font-size:2rem;flex-shrink:0" id="profileAvatar"></div>
      <div class="flex-grow-1">
        <h5 class="fw-bold mb-0" id="profileNickname"></h5>
        <p class="text-muted small mb-2" id="profileEmail"></p>
        <div class="d-flex gap-3 flex-wrap">
          <span class="small"><i class="bi bi-collection me-1 text-primary"></i>영상 <strong id="statV">0</strong>개</span>
          <span class="small"><i class="bi bi-palette me-1 text-primary"></i>테마 <strong id="statT">0</strong>개</span>
          <span class="small"><i class="bi bi-pencil-square me-1 text-primary"></i>게시글 <strong id="statP">0</strong>개</span>
          <span class="small"><i class="bi bi-calendar me-1 text-muted"></i><span id="joinDate"></span> 가입</span>
        </div>
      </div>
      <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#editProfileModal">
        <i class="bi bi-person-gear me-1"></i>프로필 수정
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-4">
    <li class="nav-item"><button class="nav-link active" data-tab="videos">내 아카이브</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="posts">내 게시글</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="bookmarks">북마크</button></li>
  </ul>

  <!-- Videos Tab -->
  <div id="tab-videos">
    <div class="row g-3" id="myVideoGrid"></div>
    <div id="myVideoEmpty" class="empty-state d-none">
      <div class="empty-icon">📭</div>
      <p class="text-muted">저장된 영상이 없습니다.</p>
      <a href="dashboard.html" class="btn btn-primary btn-sm">영상 추가하기</a>
    </div>
  </div>

  <!-- Posts Tab -->
  <div id="tab-posts" class="d-none">
    <div class="d-flex flex-column gap-3" id="myPostList"></div>
    <div id="myPostEmpty" class="empty-state d-none">
      <div class="empty-icon">💬</div>
      <p class="text-muted">작성한 게시글이 없습니다.</p>
      <a href="write.html" class="btn btn-primary btn-sm">글쓰기</a>
    </div>
  </div>

  <!-- Bookmarks Tab -->
  <div id="tab-bookmarks" class="d-none">
    <div class="d-flex flex-column gap-3" id="bkList"></div>
    <div id="bkEmpty" class="empty-state d-none">
      <div class="empty-icon">🔖</div>
      <p class="text-muted">북마크한 게시글이 없습니다.</p>
      <a href="community.html" class="btn btn-primary btn-sm">커뮤니티 보기</a>
    </div>
  </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal fade" id="editProfileModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-person-gear me-2 text-primary"></i>프로필 수정</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">닉네임 <span class="text-muted fw-normal">(2~12자)</span></label>
          <input type="text" id="editNickname" class="form-control" maxlength="12">
        </div>
        <div id="profileAlert" class="alert alert-danger d-none"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-primary" id="saveProfileBtn">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
const session = Auth.requireAuth();
if (!session) throw new Error('redirect');
initHeader(session);

const user   = DB.getUserById(session.userId);
const videos = DB.getVideos(session.userId);
const themes = DB.getThemes(session.userId);
const myPosts = DB.getPostsByUser(session.userId);
const bkPosts = DB.getBookmarkedPosts(session.userId);

// ── Profile ───────────────────────────────────────────────
document.getElementById('profileAvatar').textContent   = session.nickname[0].toUpperCase();
document.getElementById('profileNickname').textContent = session.nickname;
document.getElementById('profileEmail').textContent    = session.email;
document.getElementById('statV').textContent  = videos.length;
document.getElementById('statT').textContent  = themes.length;
document.getElementById('statP').textContent  = myPosts.length;
document.getElementById('joinDate').textContent = formatDate(user?.createdAt);
document.getElementById('editNickname').value = session.nickname;

// ── Profile edit ──────────────────────────────────────────
document.getElementById('saveProfileBtn').addEventListener('click', () => {
  const nick = document.getElementById('editNickname').value.trim();
  const alert = document.getElementById('profileAlert');
  alert.classList.add('d-none');
  if (nick.length < 2 || nick.length > 12) {
    alert.textContent = '닉네임은 2~12자이어야 합니다.';
    alert.classList.remove('d-none'); return;
  }
  const users = DB.getUsers();
  const i = users.findIndex(u => u.id === session.userId);
  if (i !== -1) { users[i].nickname = nick; DB.saveUsers(users); }
  // Update session
  const s = DB.getSession();
  s.nickname = nick;
  DB.setSession(s);
  bootstrap.Modal.getInstance(document.getElementById('editProfileModal')).hide();
  showToast('프로필이 수정되었습니다.');
  setTimeout(() => location.reload(), 800);
});

// ── Tabs ──────────────────────────────────────────────────
document.querySelectorAll('.nav-tabs .nav-link').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-tabs .nav-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['videos','posts','bookmarks'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('d-none', btn.dataset.tab !== t);
    });
  });
});

// ── My Videos ─────────────────────────────────────────────
function renderMyVideos() {
  const grid  = document.getElementById('myVideoGrid');
  const empty = document.getElementById('myVideoEmpty');
  if (!videos.length) { empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');
  grid.innerHTML = videos.map(v => `
    <div class="col-sm-6 col-md-4">
      <div class="video-card" onclick="location.href='video.html?id=${v.id}'">
        <img class="thumb" src="${escapeHtml(v.thumbnail)}" alt=""
             onerror="this.src='https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg'">
        <div class="card-body">
          <div class="card-title">${escapeHtml(v.title)}</div>
          <div class="text-muted small">${escapeHtml(v.channel)}</div>
          <div class="text-muted mt-1" style="font-size:.72rem">
            ${v.isPublic ? '<span class="badge bg-success-subtle text-success me-1">공개</span>' : ''}
            ${v.isFav   ? '<i class="bi bi-star-fill text-warning me-1"></i>' : ''}
            ${formatRelative(v.createdAt)}
          </div>
        </div>
      </div>
    </div>`).join('');
}

// ── My Posts ──────────────────────────────────────────────
function renderMyPosts() {
  const list  = document.getElementById('myPostList');
  const empty = document.getElementById('myPostEmpty');
  if (!myPosts.length) { empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');
  list.innerHTML = myPosts.map(p => `
    <div class="post-card">
      <a href="post.html?id=${p.id}" class="text-decoration-none text-dark">
        <h6 class="fw-bold mb-1">${escapeHtml(p.title)}</h6>
      </a>
      <div class="text-muted small d-flex gap-3 flex-wrap">
        <span>${formatDate(p.createdAt)}</span>
        <span><i class="bi bi-heart me-1"></i>${(p.likes||[]).length}</span>
        <span><i class="bi bi-chat me-1"></i>${DB.getComments(p.id).length}</span>
        <div class="ms-auto d-flex gap-1">
          <a href="write.html?id=${p.id}" class="btn btn-sm btn-outline-secondary py-0">수정</a>
          <button class="btn btn-sm btn-outline-danger py-0" onclick="deleteMyPost('${p.id}')">삭제</button>
        </div>
      </div>
    </div>`).join('');
}

function deleteMyPost(id) {
  showConfirm('게시글을 삭제하시겠습니까?', () => {
    DB.deletePost(id); location.reload();
  });
}

// ── Bookmarks ─────────────────────────────────────────────
function renderBookmarks() {
  const list  = document.getElementById('bkList');
  const empty = document.getElementById('bkEmpty');
  if (!bkPosts.length) { empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');
  list.innerHTML = bkPosts.map(p => {
    const author = DB.getUserById(p.userId);
    const video  = p.videoId ? DB.getVideoById(p.videoId) : null;
    return `
      <div class="post-card">
        <div class="d-flex gap-3 align-items-start">
          ${video ? `<img class="post-thumb" src="${escapeHtml(video.thumbnail)}" alt="">` : ''}
          <div class="flex-grow-1 min-w-0">
            <a href="post.html?id=${p.id}" class="text-decoration-none text-dark">
              <h6 class="fw-bold mb-1 text-truncate">${escapeHtml(p.title)}</h6>
            </a>
            <div class="text-muted small">
              <span>${escapeHtml(author?.nickname || '알 수 없음')}</span>
              <span class="mx-1">·</span><span>${formatDate(p.createdAt)}</span>
              <span class="ms-2"><i class="bi bi-heart me-1"></i>${(p.likes||[]).length}</span>
            </div>
          </div>
          <button class="btn btn-sm btn-link text-primary p-0 flex-shrink-0" onclick="removeBookmark('${p.id}')">
            <i class="bi bi-bookmark-fill"></i>
          </button>
        </div>
      </div>`;
  }).join('');
}

function removeBookmark(postId) {
  DB.toggleBookmark(postId, session.userId);
  showToast('북마크에서 제거했습니다.', 'info');
  setTimeout(() => location.reload(), 600);
}

renderMyVideos();
renderMyPosts();
renderBookmarks();
</script>
</body>
</html>
