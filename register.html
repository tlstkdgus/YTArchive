<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - YTArchive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body style="background:var(--yta-bg)">

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-film me-1"></i>YTArchive</a>
  </div>
</nav>

<div class="auth-wrap py-5">
  <div class="auth-card card">
    <div class="card-body">
      <div class="text-center mb-4">
        <div class="fs-2 mb-1">🎬</div>
        <h4 class="fw-bold mb-0">계정 만들기</h4>
        <p class="text-muted small mt-1">무료로 시작하세요</p>
      </div>

      <div id="alertBox" class="alert alert-danger d-none"></div>

      <form id="registerForm" novalidate>
        <!-- 닉네임 -->
        <div class="mb-3">
          <label class="form-label fw-semibold">닉네임 <span class="text-muted fw-normal">(2~12자)</span></label>
          <input type="text" id="nickname" class="form-control" placeholder="닉네임 입력" maxlength="12" required>
          <div class="invalid-feedback" id="nickError"></div>
        </div>

        <!-- 이메일 -->
        <div class="mb-3">
          <label class="form-label fw-semibold">이메일 주소</label>
          <input type="email" id="email" class="form-control" placeholder="user@example.com" required>
          <div class="invalid-feedback" id="emailError"></div>
        </div>

        <!-- 비밀번호 -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            비밀번호 <span class="text-muted fw-normal">(8자 이상)</span>
            <span class="ms-2 badge" id="pwStrengthBadge"></span>
          </label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="비밀번호 입력" required>
            <button type="button" class="btn btn-outline-secondary" id="togglePw">
              <i class="bi bi-eye" id="pwIcon"></i>
            </button>
          </div>
          <div class="progress mt-2" style="height:4px;">
            <div class="progress-bar" id="pwStrengthBar" style="width:0;transition:all .3s;"></div>
          </div>
          <div class="invalid-feedback" id="pwError"></div>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="mb-4">
          <label class="form-label fw-semibold">비밀번호 확인</label>
          <div class="input-group">
            <input type="password" id="pwConfirm" class="form-control" placeholder="비밀번호 재입력" required>
            <span class="input-group-text" id="pwMatchIcon"></span>
          </div>
          <div class="invalid-feedback" id="pwConfirmError"></div>
        </div>

        <!-- 약관 -->
        <div class="mb-4 p-3 bg-light rounded-3">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="terms" required>
            <label class="form-check-label small" for="terms">
              <strong>이용약관</strong> 및 <strong>개인정보 처리방침</strong>에 동의합니다. <span class="text-danger">(필수)</span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="registerBtn" disabled>
          회원가입
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted small mb-0">
        이미 계정이 있으신가요? <a href="login.html" class="text-primary fw-semibold text-decoration-none">로그인</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  Auth.redirectIfAuth();

  const nickEl    = document.getElementById('nickname');
  const emailEl   = document.getElementById('email');
  const pwEl      = document.getElementById('password');
  const pwCfEl    = document.getElementById('pwConfirm');
  const termsEl   = document.getElementById('terms');
  const submitBtn = document.getElementById('registerBtn');

  // 비밀번호 강도
  pwEl.addEventListener('input', () => {
    const str = pwStrength(pwEl.value);
    const bar  = document.getElementById('pwStrengthBar');
    const badge = document.getElementById('pwStrengthBadge');
    bar.style.width = str.pct + '%';
    bar.className = `progress-bar bg-${str.color}`;
    badge.textContent = str.label;
    badge.className = `ms-2 badge bg-${str.color}`;
    checkSubmit();
  });

  // 비밀번호 확인 일치
  pwCfEl.addEventListener('input', () => {
    const icon = document.getElementById('pwMatchIcon');
    if (pwCfEl.value === pwEl.value && pwCfEl.value) {
      icon.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i>';
    } else if (pwCfEl.value) {
      icon.innerHTML = '<i class="bi bi-x-circle-fill text-danger"></i>';
    } else {
      icon.innerHTML = '';
    }
    checkSubmit();
  });

  // 비밀번호 토글
  document.getElementById('togglePw').addEventListener('click', () => {
    const icon = document.getElementById('pwIcon');
    if (pwEl.type === 'password') { pwEl.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else                          { pwEl.type = 'password'; icon.className = 'bi bi-eye'; }
  });

  // 버튼 활성화 체크
  [nickEl, emailEl, pwEl, pwCfEl, termsEl].forEach(el => el.addEventListener('input', checkSubmit));
  termsEl.addEventListener('change', checkSubmit);

  function checkSubmit() {
    submitBtn.disabled = !(
      nickEl.value.trim().length >= 2 &&
      emailEl.value.trim() &&
      pwEl.value.length >= 8 &&
      pwCfEl.value === pwEl.value &&
      termsEl.checked
    );
  }

  // 실시간 검증
  nickEl.addEventListener('blur', () => {
    const err = document.getElementById('nickError');
    if (nickEl.value.length < 2 || nickEl.value.length > 12) {
      nickEl.classList.add('is-invalid'); err.textContent = '닉네임은 2~12자이어야 합니다.';
    } else { nickEl.classList.remove('is-invalid'); nickEl.classList.add('is-valid'); }
  });
  emailEl.addEventListener('blur', () => {
    const err = document.getElementById('emailError');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
      emailEl.classList.add('is-invalid'); err.textContent = '올바른 이메일 형식이 아닙니다.';
    } else { emailEl.classList.remove('is-invalid'); emailEl.classList.add('is-valid'); }
  });

  // 제출
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    alertBox.classList.add('d-none');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>가입 중...';

    try {
      await Auth.register(
        emailEl.value.trim(),
        nickEl.value.trim(),
        pwEl.value
      );
      showToast('회원가입이 완료되었습니다!');
      setTimeout(() => window.location.href = 'login.html', 800);
    } catch (err) {
      alertBox.textContent = err.message;
      alertBox.classList.remove('d-none');
      submitBtn.disabled = false;
      submitBtn.textContent = '회원가입';
    }
  });
</script>
</body>
</html>
