<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영상 상세 - YTArchive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html"><i class="bi bi-film me-1"></i>YTArchive</a>
    <div class="d-flex gap-2 align-items-center ms-auto">
      <a href="dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>대시보드</a>
      <div id="memberNav" class="d-none dropdown">
        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle me-1"></i><span id="userNickname"></span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="mypage.html">마이페이지</a></li>
          <li><a class="dropdown-item text-danger" href="#" onclick="Auth.logout()">로그아웃</a></li>
        </ul>
      </div>
      <div id="guestNav" class="d-none"><a href="login.html" class="btn btn-primary btn-sm">로그인</a></div>
    </div>
  </div>
</nav>

<!-- ── Content ─────────────────────────────────────────────── -->
<div class="container-fluid px-4 py-4">
  <div class="row g-4">

    <!-- Left: Player + Info (60%) -->
    <div class="col-lg-7">

      <!-- ① 임베드 플레이어 -->
      <div id="ytPlayerWrap" class="player-wrap mb-1">
        <div id="ytPlayer"></div>
      </div>

      <!-- ② 임베드 실패 시 fallback (기본 숨김) -->
      <div id="playerFallback" class="d-none mb-3">
        <div class="player-wrap position-relative" style="cursor:pointer;" onclick="openYtPopup()">
          <img id="videoThumb" src="" alt=""
               style="width:100%;height:100%;object-fit:cover;border-radius:10px;display:block;">
          <div class="thumb-overlay"
               style="position:absolute;inset:0;background:rgba(0,0,0,.45);border-radius:10px;
                      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:background .2s;">
            <div style="width:72px;height:72px;background:rgba(255,0,0,.9);border-radius:50%;
                        display:flex;align-items:center;justify-content:center;">
              <i class="bi bi-play-fill text-white" style="font-size:2rem;margin-left:4px;"></i>
            </div>
            <span class="text-white fw-semibold small bg-dark bg-opacity-50 px-3 py-1 rounded-pill">
              클릭하면 YouTube 팝업으로 열립니다
            </span>
          </div>
        </div>
        <div class="d-flex gap-2 mt-2">
          <button class="btn btn-danger btn-sm flex-grow-1" onclick="openYtPopup()">
            <i class="bi bi-youtube me-1"></i>YouTube 팝업으로 열기 (메모 작성 가능)
          </button>
          <a id="ytDirectLink" href="#" target="_blank" rel="noopener" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-box-arrow-up-right me-1"></i>새 탭
          </a>
        </div>
        <p class="text-muted small text-center mt-2 mb-0">
          <i class="bi bi-info-circle me-1"></i>이 영상은 임베드가 제한되어 있습니다. 팝업으로 열어 메모를 작성하세요.
        </p>
      </div>

      <!-- 임베드 로딩 중 힌트 -->
      <p id="ytHint" class="text-muted small text-center mt-1 mb-3">
        <i class="bi bi-youtube text-danger me-1"></i>영상 로딩 중...
      </p>

      <!-- Video info -->
      <div class="bg-white rounded-3 border border-light p-3">
        <h5 class="fw-bold mb-1" id="videoTitle">로딩 중...</h5>
        <div class="text-muted small mb-2">
          <span id="videoChannel"></span>
          <span class="mx-2">·</span>
          <span id="videoDate"></span>
          <span class="ms-2" id="videoPublic"></span>
        </div>
        <div id="videoThemes" class="mb-2"></div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-secondary" id="editVideoBtn">
            <i class="bi bi-pencil me-1"></i>수정
          </button>
          <button class="btn btn-sm btn-outline-danger" id="deleteVideoBtn">
            <i class="bi bi-trash me-1"></i>삭제
          </button>
        </div>
      </div>
    </div>

    <!-- Right: Memo + Timestamp (40%) -->
    <div class="col-lg-5">
      <div class="side-panel">
        <!-- Tabs -->
        <ul class="nav nav-tabs px-3 pt-2">
          <li class="nav-item">
            <button class="nav-link active" id="memoTab" data-tab="memo">
              <i class="bi bi-pencil me-1"></i>메모 <span class="badge bg-secondary ms-1" id="memoCnt">0</span>
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="tsTab" data-tab="ts">
              <i class="bi bi-clock me-1"></i>타임스탬프 <span class="badge bg-secondary ms-1" id="tsCnt">0</span>
            </button>
          </li>
        </ul>

        <!-- Memo panel -->
        <div id="memoPanel" class="p-3">
          <div class="mb-3">
            <textarea id="memoInput" class="form-control" rows="3" placeholder="메모를 입력하세요..." maxlength="500"></textarea>
            <div class="d-flex justify-content-between align-items-center mt-1">
              <span class="text-muted small"><span id="memoLen">0</span>/500</span>
              <button class="btn btn-primary btn-sm" id="saveMemoBtn">
                <i class="bi bi-check-lg me-1"></i>저장
              </button>
            </div>
          </div>
          <div id="memoList"></div>
          <div id="memoEmpty" class="text-center text-muted small py-3 d-none">
            <i class="bi bi-pencil-square fs-4 d-block mb-1 opacity-50"></i>메모가 없습니다
          </div>
        </div>

        <!-- Timestamp panel -->
        <div id="tsPanel" class="p-3 d-none">
          <div class="mb-3 p-3 bg-light rounded-3">
            <div class="row g-2">
              <div class="col-5">
                <label class="form-label small fw-semibold mb-1">시간 (MM:SS 또는 HH:MM:SS)</label>
                <input type="text" id="tsTime" class="form-control form-control-sm" placeholder="00:00">
              </div>
              <div class="col-7">
                <label class="form-label small fw-semibold mb-1">레이블</label>
                <input type="text" id="tsLabel" class="form-control form-control-sm" placeholder="구간 설명...">
              </div>
            </div>
            <div class="mt-2">
              <label class="form-label small fw-semibold mb-1">메모 (선택)</label>
              <input type="text" id="tsMemo" class="form-control form-control-sm" placeholder="추가 메모...">
            </div>
            <button class="btn btn-primary btn-sm w-100 mt-2" id="saveTsBtn">
              <i class="bi bi-plus me-1"></i>타임스탬프 추가
            </button>
            <div id="tsAlert" class="alert alert-danger d-none mt-2 py-1 small"></div>
          </div>
          <div id="tsList"></div>
          <div id="tsEmpty" class="text-center text-muted small py-3 d-none">
            <i class="bi bi-clock fs-4 d-block mb-1 opacity-50"></i>타임스탬프가 없습니다
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit video modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content rounded-4">
      <div class="modal-header border-0 pb-0">
        <h6 class="modal-title fw-bold">영상 수정</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label small fw-semibold">공개 여부</label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="evVis" id="evPub" value="public">
              <label class="form-check-label small" for="evPub">공개</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="evVis" id="evPrv" value="private" checked>
              <label class="form-check-label small" for="evPrv">비공개</label>
            </div>
          </div>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="evFav">
          <label class="form-check-label small" for="evFav">즐겨찾기</label>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-primary btn-sm" id="saveEditBtn">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
const session = Auth.requireAuth();
if (!session) throw new Error('redirect');
initHeader(session);

const videoId = getParam('id');
if (!videoId) { location.href = 'dashboard.html'; throw new Error(); }

let video = DB.getVideoById(videoId);
if (!video) { alert('영상을 찾을 수 없습니다.'); location.href = 'dashboard.html'; throw new Error(); }

// ── Load video info ───────────────────────────────────────
function loadVideo() {
  video = DB.getVideoById(videoId);
  document.title = video.title + ' - YTArchive';
  document.getElementById('videoThumb').src           = video.thumbnail;
  document.getElementById('videoThumb').alt           = video.title;
  document.getElementById('ytDirectLink').href        = `https://www.youtube.com/watch?v=${video.videoId}`;
  document.getElementById('videoTitle').textContent   = video.title;
  document.getElementById('videoChannel').textContent = video.channel;
  document.getElementById('videoDate').textContent    = formatDate(video.createdAt);
  document.getElementById('videoPublic').innerHTML    = video.isPublic
    ? '<span class="badge bg-success-subtle text-success"><i class="bi bi-globe me-1"></i>공개</span>'
    : '<span class="badge bg-secondary-subtle text-secondary"><i class="bi bi-lock me-1"></i>비공개</span>';

  const themes = DB.getThemes(session.userId);
  document.getElementById('videoThemes').innerHTML = (video.themes||[])
    .map(tid => themes.find(t=>t.id===tid))
    .filter(Boolean)
    .map(t => `<span class="tag-badge me-1">${escapeHtml(t.name)}</span>`)
    .join('');
}

// ── YouTube IFrame Player ─────────────────────────────────
var ytPlayer = null;
var embedTimer = null;

// IFrame API 준비되면 자동 호출
function onYouTubeIframeAPIReady() {
  clearTimeout(embedTimer); // API 로드 타임아웃 취소
  ytPlayer = new YT.Player('ytPlayer', {
    videoId: video.videoId,
    playerVars: { autoplay: 0, rel: 0, modestbranding: 1 },
    events: {
      onReady: () => {
        clearTimeout(embedTimer);
        document.getElementById('ytHint').innerHTML =
          '<i class="bi bi-check-circle text-success me-1"></i>재생하면서 메모를 작성하세요.';
      },
      onError: () => { clearTimeout(embedTimer); showPlayerFallback(); }
    }
  });
  // 플레이어 생성 후 5초 안에 onReady 없으면 fallback
  embedTimer = setTimeout(showPlayerFallback, 5000);
}

// 임베드 오류 시 fallback 표시
function showPlayerFallback() {
  document.getElementById('ytPlayerWrap').classList.add('d-none');
  document.getElementById('playerFallback').classList.remove('d-none');
  document.getElementById('ytHint').classList.add('d-none');
}

// YouTube를 팝업 창으로 열기 (화면 오른쪽 상단)
function openYtPopup() {
  const url  = `https://www.youtube.com/watch?v=${video.videoId}`;
  const w    = 854, h = 500;
  const left = Math.max(0, window.screenX + window.outerWidth - w - 20);
  const top  = Math.max(0, window.screenY + 60);
  window.open(url, 'ytpopup', `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=no`);
}

// ── Tabs ──────────────────────────────────────────────────
document.querySelectorAll('.nav-link[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-link[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('memoPanel').classList.toggle('d-none', tab !== 'memo');
    document.getElementById('tsPanel').classList.toggle('d-none', tab !== 'ts');
  });
});

// ── Memos ─────────────────────────────────────────────────
const memoInput = document.getElementById('memoInput');
memoInput.addEventListener('input', () => {
  document.getElementById('memoLen').textContent = memoInput.value.length;
});

function renderMemos() {
  const memos = DB.getMemos(videoId);
  document.getElementById('memoCnt').textContent = memos.length;
  const list  = document.getElementById('memoList');
  const empty = document.getElementById('memoEmpty');
  if (!memos.length) { list.innerHTML = ''; empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');
  list.innerHTML = memos.map(m => `
    <div class="memo-item mb-2" id="memo_${m.id}">
      <div class="d-flex justify-content-between align-items-start gap-2">
        <div class="flex-grow-1">
          <div id="memoText_${m.id}" class="small">${escapeHtml(m.content)}</div>
          <textarea id="memoEdit_${m.id}" class="form-control form-control-sm mt-1 d-none" rows="2"
            maxlength="500">${escapeHtml(m.content)}</textarea>
        </div>
        <div class="d-flex gap-1 flex-shrink-0">
          <button class="btn btn-sm btn-link text-muted p-0" onclick="startEditMemo('${m.id}')">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-link text-danger p-0" onclick="deleteMemo('${m.id}')">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
      <div class="text-muted mt-1" style="font-size:.7rem">${formatRelative(m.createdAt)}</div>
      <div class="d-none gap-2 mt-1" id="memoActions_${m.id}">
        <button class="btn btn-primary btn-sm" onclick="saveMemoEdit('${m.id}')">저장</button>
        <button class="btn btn-secondary btn-sm" onclick="cancelMemoEdit('${m.id}')">취소</button>
      </div>
    </div>`).join('');
}

document.getElementById('saveMemoBtn').addEventListener('click', () => {
  const content = memoInput.value.trim();
  if (!content) return;
  DB.addMemo({ videoId, userId: session.userId, content });
  memoInput.value = '';
  document.getElementById('memoLen').textContent = '0';
  renderMemos();
  showToast('메모가 저장되었습니다.');
});

function startEditMemo(id) {
  document.getElementById('memoText_' + id).classList.add('d-none');
  document.getElementById('memoEdit_' + id).classList.remove('d-none');
  document.getElementById('memoActions_' + id).classList.remove('d-none');
  document.getElementById('memoActions_' + id).classList.add('d-flex');
}
function cancelMemoEdit(id) {
  document.getElementById('memoText_' + id).classList.remove('d-none');
  document.getElementById('memoEdit_' + id).classList.add('d-none');
  document.getElementById('memoActions_' + id).classList.add('d-none');
  document.getElementById('memoActions_' + id).classList.remove('d-flex');
}
function saveMemoEdit(id) {
  const content = document.getElementById('memoEdit_' + id).value.trim();
  if (!content) return;
  DB.updateMemo(id, content);
  renderMemos();
  showToast('메모가 수정되었습니다.');
}
function deleteMemo(id) {
  showConfirm('이 메모를 삭제하시겠습니까?', () => {
    DB.deleteMemo(id); renderMemos(); showToast('메모가 삭제되었습니다.', 'danger');
  });
}

// ── Timestamps ────────────────────────────────────────────
function renderTimestamps() {
  const stamps = DB.getTimestamps(videoId);
  document.getElementById('tsCnt').textContent = stamps.length;
  const list  = document.getElementById('tsList');
  const empty = document.getElementById('tsEmpty');
  if (!stamps.length) { list.innerHTML = ''; empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');
  list.innerHTML = stamps.map(ts => `
    <div class="ts-item">
      <a class="ts-badge text-decoration-none" href="${escapeHtml(YTUtil.deepLink(video.videoId, ts.seconds))}" target="_blank" rel="noopener">
        ${escapeHtml(secondsToTime(ts.seconds))}
      </a>
      <div class="flex-grow-1 min-w-0">
        <div class="fw-semibold small text-truncate">${escapeHtml(ts.label || '구간')}</div>
        ${ts.memo ? `<div class="text-muted small text-truncate">${escapeHtml(ts.memo)}</div>` : ''}
      </div>
      <button class="btn btn-sm btn-link text-danger p-0 flex-shrink-0" onclick="deleteTs('${ts.id}')">
        <i class="bi bi-trash"></i>
      </button>
    </div>`).join('');
}

document.getElementById('saveTsBtn').addEventListener('click', () => {
  const timeStr = document.getElementById('tsTime').value.trim();
  const label   = document.getElementById('tsLabel').value.trim();
  const memo    = document.getElementById('tsMemo').value.trim();
  const alert   = document.getElementById('tsAlert');
  alert.classList.add('d-none');

  const seconds = timeToSeconds(timeStr);
  if (seconds === null) {
    alert.textContent = 'MM:SS 또는 HH:MM:SS 형식으로 입력해주세요.';
    alert.classList.remove('d-none'); return;
  }
  DB.addTimestamp({ videoId, userId: session.userId, seconds, label, memo });
  document.getElementById('tsTime').value  = '';
  document.getElementById('tsLabel').value = '';
  document.getElementById('tsMemo').value  = '';
  renderTimestamps();
  showToast('타임스탬프가 저장되었습니다.');
});

function deleteTs(id) {
  showConfirm('이 타임스탬프를 삭제하시겠습니까?', () => {
    DB.deleteTimestamp(id); renderTimestamps(); showToast('타임스탬프가 삭제되었습니다.', 'danger');
  });
}

// ── Edit / Delete video ───────────────────────────────────
document.getElementById('editVideoBtn').addEventListener('click', () => {
  document.querySelector(`input[name="evVis"][value="${video.isPublic ? 'public' : 'private'}"]`).checked = true;
  document.getElementById('evFav').checked = !!video.isFav;
  bootstrap.Modal.getOrCreateInstance(document.getElementById('editModal')).show();
});
document.getElementById('saveEditBtn').addEventListener('click', () => {
  const isPublic = document.querySelector('input[name="evVis"]:checked').value === 'public';
  const isFav    = document.getElementById('evFav').checked;
  DB.updateVideo(videoId, { isPublic, isFav });
  bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
  loadVideo();
  showToast('영상 정보가 수정되었습니다.');
});
document.getElementById('deleteVideoBtn').addEventListener('click', () => {
  showConfirm('이 영상과 관련된 메모, 타임스탬프도 함께 삭제됩니다.', () => {
    DB.deleteVideo(videoId);
    showToast('영상이 삭제되었습니다.', 'danger');
    setTimeout(() => location.href = 'dashboard.html', 800);
  });
});

// ── Init ─────────────────────────────────────────────────
loadVideo();
renderMemos();
renderTimestamps();

// YouTube API 스크립트 로드 실패 대비 — 즉시 타임아웃 시작
// (onYouTubeIframeAPIReady가 호출되면 이 타이머는 취소됨)
embedTimer = setTimeout(showPlayerFallback, 5000);
</script>
</body>
</html>
