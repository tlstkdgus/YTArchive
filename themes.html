<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테마 관리 - YTArchive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html"><i class="bi bi-film me-1"></i>YTArchive</a>
    <div class="d-flex gap-2 align-items-center ms-auto">
      <a href="dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>대시보드</a>
      <div id="memberNav" class="d-none dropdown">
        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle me-1"></i><span id="userNickname"></span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="mypage.html">마이페이지</a></li>
          <li><a class="dropdown-item text-danger" href="#" onclick="Auth.logout()">로그아웃</a></li>
        </ul>
      </div>
      <div id="guestNav" class="d-none"></div>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex align-items-center mb-4">
    <div>
      <h4 class="fw-bold mb-0"><i class="bi bi-palette me-2 text-primary"></i>테마 관리</h4>
      <p class="text-muted small mb-0">영상을 분류할 나만의 테마를 만들어보세요 (최대 50개)</p>
    </div>
    <button class="btn btn-primary ms-auto" data-bs-toggle="modal" data-bs-target="#themeModal" onclick="openCreateModal()">
      <i class="bi bi-plus me-1"></i>새 테마
    </button>
  </div>

  <div class="row g-3" id="themeGrid"></div>

  <div id="emptyState" class="empty-state d-none">
    <div class="empty-icon">🗂️</div>
    <h5 class="fw-semibold">테마가 없습니다</h5>
    <p class="text-muted">첫 테마를 만들어 영상을 분류해보세요!</p>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#themeModal" onclick="openCreateModal()">
      <i class="bi bi-plus me-1"></i>테마 만들기
    </button>
  </div>
</div>

<!-- Theme Modal -->
<div class="modal fade" id="themeModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="themeModalTitle">새 테마 만들기</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editThemeId">
        <div class="mb-3">
          <label class="form-label fw-semibold">테마 이름 <span class="text-danger">*</span>
            <span class="text-muted fw-normal">(2~20자)</span>
          </label>
          <input type="text" id="themeName" class="form-control" placeholder="예: 개발/IT, 음악, 강의..." maxlength="20">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">설명 <span class="text-muted fw-normal">(선택)</span></label>
          <input type="text" id="themeDesc" class="form-control" placeholder="테마 설명..." maxlength="100">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">색상</label>
          <div id="colorPicker" class="d-flex flex-wrap gap-1 mt-1"></div>
        </div>
        <div id="themeAlert" class="alert alert-danger d-none"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-primary" id="saveThemeBtn">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
const session = Auth.requireAuth();
if (!session) throw new Error('redirect');
initHeader(session);

let selectedColor = THEME_COLORS[0];
let editingId = null;

function renderThemes() {
  const themes = DB.getThemes(session.userId);
  const videos = DB.getVideos(session.userId);
  const grid   = document.getElementById('themeGrid');
  const empty  = document.getElementById('emptyState');

  if (!themes.length) { grid.innerHTML = ''; empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');

  grid.innerHTML = themes.map(t => {
    const cnt = videos.filter(v => (v.themes||[]).includes(t.id)).length;
    return `
      <div class="col-sm-6 col-lg-4">
        <div class="theme-card">
          <div class="d-flex align-items-start gap-2 mb-2">
            <div style="width:44px;height:44px;border-radius:12px;background:${escapeHtml(t.color||'#7B2FBE')};
              display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <i class="bi bi-collection-fill text-white"></i>
            </div>
            <div class="min-w-0">
              <div class="fw-bold text-truncate">${escapeHtml(t.name)}</div>
              <div class="text-muted small">${cnt}개 영상</div>
            </div>
          </div>
          ${t.description ? `<p class="text-muted small mb-3">${escapeHtml(t.description)}</p>` : '<div class="mb-3"></div>'}
          <div class="d-flex gap-2">
            <a href="dashboard.html" class="btn btn-sm btn-outline-primary flex-grow-1">
              <i class="bi bi-collection me-1"></i>영상 보기
            </a>
            <button class="btn btn-sm btn-outline-secondary" onclick="openEditModal('${t.id}')">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteTheme('${t.id}')">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// Color picker
function renderColorPicker(selected) {
  selectedColor = selected || THEME_COLORS[0];
  document.getElementById('colorPicker').innerHTML = THEME_COLORS.map(c => `
    <div class="color-opt" data-color="${c}" onclick="selectColor('${c}')"
         style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;
                border:3px solid ${c === selectedColor ? '#000' : 'transparent'};
                transition:border .15s">
    </div>`).join('');
}

function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-opt').forEach(el => {
    el.style.border = `3px solid ${el.dataset.color === c ? '#000' : 'transparent'}`;
  });
}

function openCreateModal() {
  editingId = null;
  document.getElementById('themeModalTitle').textContent = '새 테마 만들기';
  document.getElementById('editThemeId').value = '';
  document.getElementById('themeName').value = '';
  document.getElementById('themeDesc').value = '';
  document.getElementById('themeAlert').classList.add('d-none');
  renderColorPicker(THEME_COLORS[0]);
}

function openEditModal(id) {
  const t = DB.getThemeById(id);
  if (!t) return;
  editingId = id;
  document.getElementById('themeModalTitle').textContent = '테마 수정';
  document.getElementById('editThemeId').value = id;
  document.getElementById('themeName').value = t.name;
  document.getElementById('themeDesc').value = t.description || '';
  document.getElementById('themeAlert').classList.add('d-none');
  renderColorPicker(t.color);
  bootstrap.Modal.getOrCreateInstance(document.getElementById('themeModal')).show();
}

document.getElementById('saveThemeBtn').addEventListener('click', () => {
  const name = document.getElementById('themeName').value.trim();
  const desc = document.getElementById('themeDesc').value.trim();
  const alert = document.getElementById('themeAlert');
  alert.classList.add('d-none');

  if (name.length < 2 || name.length > 20) {
    alert.textContent = '테마 이름은 2~20자이어야 합니다.';
    alert.classList.remove('d-none'); return;
  }

  const existing = DB.getThemes(session.userId);
  if (!editingId && existing.length >= 50) {
    alert.textContent = '테마는 최대 50개까지 만들 수 있습니다.';
    alert.classList.remove('d-none'); return;
  }
  const dupCheck = existing.find(t => t.name === name && t.id !== editingId);
  if (dupCheck) {
    alert.textContent = '이미 같은 이름의 테마가 있습니다.';
    alert.classList.remove('d-none'); return;
  }

  if (editingId) {
    DB.updateTheme(editingId, { name, description: desc, color: selectedColor });
    showToast('테마가 수정되었습니다.');
  } else {
    DB.addTheme({ userId: session.userId, name, description: desc, color: selectedColor });
    showToast('테마가 만들어졌습니다!');
  }

  bootstrap.Modal.getInstance(document.getElementById('themeModal')).hide();
  editingId = null;
  renderThemes();
});

function deleteTheme(id) {
  const t = DB.getThemeById(id);
  showConfirm(`"${t?.name}" 테마를 삭제하시겠습니까? 영상의 테마 배정이 해제됩니다.`, () => {
    // Remove theme from all videos
    const videos = DB.getVideos(session.userId);
    videos.forEach(v => {
      if ((v.themes||[]).includes(id)) {
        DB.updateVideo(v.id, { themes: v.themes.filter(tid => tid !== id) });
      }
    });
    DB.deleteTheme(id);
    renderThemes();
    showToast('테마가 삭제되었습니다.', 'danger');
  });
}

renderThemes();
</script>
</body>
</html>
