<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 - YTArchive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html"><i class="bi bi-film me-1"></i>YTArchive</a>
    <div class="d-flex gap-2 align-items-center ms-auto">
      <div class="search-wrapper d-none d-md-block me-2">
        <i class="bi bi-search si"></i>
        <input type="text" id="searchInput" class="form-control search-input" placeholder="게시글 검색..." style="width:220px">
      </div>
      <div id="guestNav" class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-primary btn-sm">로그인</a>
        <a href="register.html" class="btn btn-primary btn-sm">회원가입</a>
      </div>
      <div id="memberNav" class="d-none d-flex gap-2 align-items-center">
        <a href="dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-grid me-1"></i>대시보드</a>
        <a href="write.html" class="btn btn-primary btn-sm"><i class="bi bi-pencil me-1"></i>글쓰기</a>
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i><span id="userNickname"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="mypage.html">마이페이지</a></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="Auth.logout()">로그아웃</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex align-items-center mb-4 flex-wrap gap-2">
    <h4 class="fw-bold mb-0 me-auto"><i class="bi bi-people me-2 text-primary"></i>커뮤니티</h4>

    <!-- 모바일 검색 -->
    <div class="search-wrapper d-md-none w-100">
      <i class="bi bi-search si"></i>
      <input type="text" id="searchInputMob" class="form-control search-input" placeholder="게시글 검색...">
    </div>

    <!-- 정렬 -->
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary active" id="sortNewest">최신순</button>
      <button class="btn btn-outline-secondary" id="sortPopular">인기순</button>
    </div>

    <!-- 글쓰기 (로그인 시) -->
    <a href="write.html" class="btn btn-primary btn-sm d-none d-md-inline-flex" id="writeBtn">
      <i class="bi bi-pencil me-1"></i>글쓰기
    </a>
  </div>

  <div id="postList" class="d-flex flex-column gap-3"></div>

  <div id="emptyState" class="empty-state d-none">
    <div class="empty-icon">💬</div>
    <h5 class="fw-semibold">게시글이 없습니다</h5>
    <p class="text-muted">첫 번째 게시글을 작성해보세요!</p>
    <a href="write.html" class="btn btn-primary" id="writeEmptyBtn">글쓰기</a>
  </div>

  <div id="loadMoreWrap" class="text-center mt-4 d-none">
    <button class="btn btn-outline-secondary px-5" id="loadMoreBtn">더 보기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
const session = Auth.getSession();
initHeader(session);

// 비로그인이면 글쓰기 버튼 숨김
if (!session) {
  document.getElementById('writeBtn')?.classList.add('d-none');
  document.getElementById('writeEmptyBtn')?.setAttribute('href', 'login.html');
}

let sortMode = 'newest';
let page     = 1;
const PAGE_SIZE = 10;
let searchQ  = '';

// 검색 이벤트
['searchInput', 'searchInputMob'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', e => { searchQ = e.target.value.trim().toLowerCase(); page = 1; renderPosts(); });
});

// 정렬
document.getElementById('sortNewest').addEventListener('click', () => {
  sortMode = 'newest';
  document.getElementById('sortNewest').classList.add('active');
  document.getElementById('sortPopular').classList.remove('active');
  page = 1; renderPosts();
});
document.getElementById('sortPopular').addEventListener('click', () => {
  sortMode = 'popular';
  document.getElementById('sortPopular').classList.add('active');
  document.getElementById('sortNewest').classList.remove('active');
  page = 1; renderPosts();
});

// URL 검색 파라미터
const urlQ = getParam('q');
if (urlQ) { searchQ = urlQ.toLowerCase(); ['searchInput','searchInputMob'].forEach(id => { const el = document.getElementById(id); if(el) el.value = urlQ; }); }

function getPosts() {
  let posts = DB.getPosts();
  if (searchQ) posts = posts.filter(p => p.title.toLowerCase().includes(searchQ) || p.content.toLowerCase().includes(searchQ));
  if (sortMode === 'popular') posts.sort((a,b) => (b.likes||[]).length - (a.likes||[]).length);
  return posts;
}

function renderPosts() {
  const all    = getPosts();
  const list   = document.getElementById('postList');
  const empty  = document.getElementById('emptyState');
  const lmWrap = document.getElementById('loadMoreWrap');

  const slice = all.slice(0, page * PAGE_SIZE);
  list.innerHTML = '';

  if (!all.length) { empty.classList.remove('d-none'); lmWrap.classList.add('d-none'); return; }
  empty.classList.add('d-none');

  slice.forEach(post => {
    const author  = DB.getUserById(post.userId);
    const video   = post.videoId ? DB.getVideoById(post.videoId) : null;
    const liked   = session && (post.likes||[]).includes(session.userId);
    const bkmd    = session && (post.bookmarks||[]).includes(session.userId);
    const cmtCnt  = DB.getComments(post.id).length;
    const tags    = (post.tags||[]).map(t => `<span class="tag-badge me-1">${escapeHtml(t)}</span>`).join('');

    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <div class="d-flex gap-3 align-items-start">
        ${video ? `<img class="post-thumb" src="${escapeHtml(video.thumbnail)}" alt="">` : ''}
        <div class="flex-grow-1 min-w-0">
          <a href="post.html?id=${post.id}" class="text-decoration-none text-dark">
            <h6 class="fw-bold mb-1 text-truncate">${escapeHtml(post.title)}</h6>
          </a>
          <p class="text-muted small mb-2 text-truncate" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:normal">
            ${escapeHtml(post.content)}
          </p>
          <div class="mb-2">${tags}</div>
          <div class="d-flex align-items-center gap-3 flex-wrap">
            <span class="small text-muted">
              <i class="bi bi-person-circle me-1"></i>${escapeHtml(author?.nickname || '알 수 없음')}
              <span class="mx-1">·</span>${formatRelative(post.createdAt)}
            </span>
            <button class="btn btn-link btn-sm p-0 text-muted text-decoration-none like-btn"
                    data-id="${post.id}" onclick="toggleLike('${post.id}', this)">
              <i class="bi ${liked ? 'bi-heart-fill text-danger' : 'bi-heart'}"></i>
              <span class="ms-1">${(post.likes||[]).length}</span>
            </button>
            <span class="small text-muted"><i class="bi bi-chat me-1"></i>${cmtCnt}</span>
            ${session ? `
            <button class="btn btn-link btn-sm p-0 text-muted text-decoration-none bk-btn"
                    data-id="${post.id}" onclick="toggleBookmark('${post.id}', this)">
              <i class="bi ${bkmd ? 'bi-bookmark-fill text-primary' : 'bi-bookmark'}"></i>
            </button>` : ''}
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  });

  lmWrap.classList.toggle('d-none', slice.length >= all.length);
}

function toggleLike(postId, btn) {
  if (!session) { location.href = 'login.html'; return; }
  const p = DB.toggleLike(postId, session.userId);
  const icon = btn.querySelector('i');
  const cnt  = btn.querySelector('span');
  const liked = (p.likes||[]).includes(session.userId);
  icon.className = `bi ${liked ? 'bi-heart-fill text-danger' : 'bi-heart'}`;
  cnt.textContent = (p.likes||[]).length;
}

function toggleBookmark(postId, btn) {
  if (!session) { location.href = 'login.html'; return; }
  const p = DB.toggleBookmark(postId, session.userId);
  const icon = btn.querySelector('i');
  const bkmd = (p.bookmarks||[]).includes(session.userId);
  icon.className = `bi ${bkmd ? 'bi-bookmark-fill text-primary' : 'bi-bookmark'}`;
  showToast(bkmd ? '북마크에 추가했습니다.' : '북마크에서 제거했습니다.', bkmd ? 'success' : 'info');
}

document.getElementById('loadMoreBtn').addEventListener('click', () => { page++; renderPosts(); });

renderPosts();
</script>
</body>
</html>
